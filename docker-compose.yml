services:
  postgres:
    image: postgres:16
    platform: ${DOCKER_PLATFORM:-}
    container_name: finance-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-financeuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-financepassword}
      POSTGRES_DB: ${POSTGRES_DB:-finance_dashboard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-financeuser} -d ${POSTGRES_DB:-finance_dashboard}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped
    networks:
      - finance-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    platform: ${DOCKER_PLATFORM:-}
    container_name: finance-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-financeuser}:${POSTGRES_PASSWORD:-financepassword}@postgres:5432/${POSTGRES_DB:-finance_dashboard}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production-minimum-32-characters}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CORS_ORIGINS: http://localhost:3000
      UPDATER_URL: http://updater:8010
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      updater:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped
    networks:
      - finance-net

  updater:
    build:
      context: ./updater
      dockerfile: Dockerfile
    platform: ${DOCKER_PLATFORM:-}
    container_name: finance-updater
    environment:
      REPO_PATH: ${PWD:-/workspace}
    volumes:
      - ${PWD:-.}:${PWD:-/workspace}
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: ${PWD:-/workspace}
    restart: unless-stopped
    networks:
      - finance-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    platform: ${DOCKER_PLATFORM:-}
    container_name: finance-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - finance-net

networks:
  finance-net:
    driver: bridge

volumes:
  postgres_data:
