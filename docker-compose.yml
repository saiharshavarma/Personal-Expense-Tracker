services:
  postgres:
    image: postgres:16
    platform: ${DOCKER_PLATFORM:-}
    container_name: finance-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-financeuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-financepassword}
      POSTGRES_DB: ${POSTGRES_DB:-finance_dashboard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-financeuser} -d ${POSTGRES_DB:-finance_dashboard}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped
    networks:
      - finance-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    platform: ${DOCKER_PLATFORM:-}
    container_name: finance-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-financeuser}:${POSTGRES_PASSWORD:-financepassword}@postgres:5432/${POSTGRES_DB:-finance_dashboard}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production-minimum-32-characters}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    networks:
      - finance-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    platform: ${DOCKER_PLATFORM:-}
    container_name: finance-frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "pnpm install 2>&1 | tail -3 && pnpm dev --host"
    restart: unless-stopped
    networks:
      - finance-net

networks:
  finance-net:
    driver: bridge

volumes:
  postgres_data:
  frontend_node_modules:
